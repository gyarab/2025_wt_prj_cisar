{% extends "app/base.html" %}

{% block content %}

<h1>Hockey API Playground</h1>

<input type="number" id="playerId" placeholder="ID hráče">
<button id="loadPlayer">Načíst hráče</button>

<div id="result"></div>

<script>

    const button = document.getElementById("loadPlayer");

    button.addEventListener("click", async () => {

        const playerId = document.getElementById("playerId").value;

        try {

            const response = await fetch(`/api/players/${playerId}`);

            if (!response.ok) {
                throw new Error("Hráč nebyl nalezen");
            }

            const player = await response.json();

            document.getElementById("result").innerHTML = `
                <h2>${player.name}</h2>
                <p>Věk: ${player.age}</p>
                <p>Pozice: ${player.position}</p>
                <p>Číslo: ${player.number}</p>
            `;

        } catch (error) {

            document.getElementById("result").innerHTML = `
                <p>${error.message}</p>
            `;
        }

    });

</script>

{% endblock %}
